{% if domain == 'sports' %}
  <span class="inline-block bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400 text-xs font-semibold px-2.5 py-0.5 rounded-full">Sports</span>
{% elif domain == 'business' %}
  <span class="inline-block bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-400 text-xs font-semibold px-2.5 py-0.5 rounded-full">Business</span>
{% else %}
  <span class="inline-block bg-purple-100 text-purple-700 dark:bg-purple-900/40 dark:text-purple-400 text-xs font-semibold px-2.5 py-0.5 rounded-full">Both</span>
{% endif %}
