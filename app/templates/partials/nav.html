<nav class="sticky top-0 z-50 bg-cream/95 dark:bg-navy/95 backdrop-blur border-b border-slate-200 dark:border-slate-800" x-data="{ open: false }">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 font-bold text-xl text-navy dark:text-white tracking-tight">
        <span class="text-teal font-mono">H</span>erufi
      </a>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="/" class="hover:text-teal transition-colors {% if request.url.path == '/' %}text-teal{% endif %}">Home</a>
        <a href="/profile" class="hover:text-teal transition-colors {% if '/profile' in request.url.path %}text-teal{% endif %}">Profile</a>
        <a href="/insights" class="hover:text-teal transition-colors {% if '/insights' in request.url.path %}text-teal{% endif %}">Insights</a>
        <a href="/news" class="hover:text-teal transition-colors {% if '/news' in request.url.path %}text-teal{% endif %}">News</a>
        <a href="/dashboard" class="hover:text-teal transition-colors {% if '/dashboard' in request.url.path %}text-teal{% endif %}">Dashboard</a>
        <a href="/track-record" class="hover:text-teal transition-colors {% if '/track-record' in request.url.path %}text-teal{% endif %}">Track Record</a>
        <a href="/contact" class="hover:text-teal transition-colors {% if '/contact' in request.url.path %}text-teal{% endif %}">Contact</a>
      </div>

      <!-- Right controls -->
      <div class="flex items-center gap-3">
        <!-- Dark mode toggle -->
        <button
          @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)"
          class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          aria-label="Toggle dark mode"
        >
          <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg x-show="darkMode" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>

        <!-- Mobile hamburger -->
        <button
          @click="open = !open"
          class="md:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
          aria-label="Toggle menu"
          :aria-expanded="open"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path x-show="open" x-cloak stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="open" x-cloak class="md:hidden border-t border-slate-200 dark:border-slate-800 bg-cream dark:bg-navy">
    <div class="flex flex-col gap-1 px-4 py-3 text-sm font-medium">
      <a href="/" @click="open=false" class="py-2 hover:text-teal transition-colors">Home</a>
      <a href="/profile" @click="open=false" class="py-2 hover:text-teal transition-colors">Profile</a>
      <a href="/insights" @click="open=false" class="py-2 hover:text-teal transition-colors">Insights</a>
      <a href="/news" @click="open=false" class="py-2 hover:text-teal transition-colors">News</a>
      <a href="/dashboard" @click="open=false" class="py-2 hover:text-teal transition-colors">Dashboard</a>
      <a href="/track-record" @click="open=false" class="py-2 hover:text-teal transition-colors">Track Record</a>
      <a href="/contact" @click="open=false" class="py-2 hover:text-teal transition-colors">Contact</a>
    </div>
  </div>
</nav>
