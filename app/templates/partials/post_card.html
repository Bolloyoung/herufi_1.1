<!-- Usage: {% include "partials/post_card.html" %} with post in context -->
<article class="group bg-white dark:bg-navy-800 rounded-2xl overflow-hidden border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
  <a href="/insights/{{ post.slug }}" class="block">
    <div class="h-2 bg-teal"></div>
    <div class="p-6">
      <div class="flex flex-wrap gap-2 mb-3">
        {% include "partials/tag_pill.html" with domain=post.domain %}
        {% for tag in post.tags[:3] %}
        <span class="inline-block bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium px-2 py-0.5 rounded-full">{{ tag }}</span>
        {% endfor %}
      </div>
      <h3 class="font-bold text-lg text-navy dark:text-white mb-2 group-hover:text-teal transition-colors leading-snug">{{ post.title }}</h3>
      <p class="text-sm text-slate-600 dark:text-slate-400 line-clamp-2 mb-4">{{ post.summary }}</p>
      <p class="text-xs text-slate-400 font-mono">
        {% if post.published_at %}{{ post.published_at.strftime('%b %d, %Y') }}{% endif %}
      </p>
    </div>
  </a>
</article>
