{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <p class="text-3xl font-bold text-navy dark:text-white"><span class="text-teal font-mono">H</span>erufi Admin</p>
      <p class="text-slate-500 text-sm mt-1">Sign in to manage content</p>
    </div>

    <form
      id="login-form"
      class="bg-white dark:bg-navy-800 rounded-2xl p-8 border border-slate-100 dark:border-slate-800 shadow-sm space-y-5"
      onsubmit="handleLogin(event)"
    >
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"
          class="w-full border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 bg-white dark:bg-navy focus:outline-none focus:ring-2 focus:ring-teal text-sm" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
          class="w-full border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 bg-white dark:bg-navy focus:outline-none focus:ring-2 focus:ring-teal text-sm" />
      </div>
      <button type="submit" class="w-full bg-teal hover:bg-teal-600 text-white font-semibold py-3 rounded-xl transition-colors text-sm">
        Sign In
      </button>
      <p id="login-error" class="text-red-500 text-xs text-center hidden"></p>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });

  if (res.ok) {
    const { access_token } = await res.json();
    localStorage.setItem('herufi_token', access_token);
    window.location.href = '/admin/dashboard';
  } else {
    errEl.textContent = 'Invalid email or password.';
    errEl.classList.remove('hidden');
  }
}
</script>
{% endblock %}
